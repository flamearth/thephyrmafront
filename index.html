<!-- Установки страницы -->
<html view="dark">
<head>
    <title>zefirma</title>
    <!-- Кодировка языка -->
    <meta
        charset="utf-8">
    <!-- Кодировки цветов -->
    <link
        rel="stylesheet"
        href="sourse/colors.css">
    <!-- Лицо: Большое -->
    <link
        rel="apple-touch-icon"
        href="pics/large.png">
    <!-- Лицо: Маленькое -->
    <link
        rel="icon"
        href="pics/small.png">
    <!-- Веб Сайт -->
    <meta
        property="og:type"
        content="website">
    <!-- Объяснение -->
    <meta
        name="description"
        content="Description">
    <!-- Обёртка -->
    <meta
        property="og:image"
        content="https://name.name/pics/preview.png">
    <!-- Ссылка -->
    <meta
        property="og:url"
        content="https://name.name/index.html">
    <!-- Адаптация -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box; }
        a {
            text-decoration: none;
            color: inherit; }
        html {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--000);
            color: var(--808);
            font-family: sans-serif;
            font-size: 21px;
            font-weight: 300; }
        body {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--000);
            padding: 0px;
            margin: 0px;
            gap: 0px;
            position: static;
            z-index: auto; }
        .space-between {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
             
            padding-top: 18px;
            padding-right: 20px;
            padding-bottom: 18px;
            padding-left: 20px;
             
            background: linear-gradient(to bottom, var(--000), var(--0000));
            
            position: fixed;
            z-index: 1; }
        .one {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 80px;
            padding-right: 20px;
            padding-bottom: 80px;
            padding-left: 20px;
            gap: 20px; }
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s ease; }
        .button:hover {
            backdrop-filter: blur(10px);
            background: var(--80810); }
        /* Смена вида */
        html[view="light"] .button:hover {
            background: var(--00010); }
        @media (max-width: 440px) {
            .space-between {
                padding-right: 20px;
                padding-left: 20px; }
            .button {
                backdrop-filter: blur(10px);
                background: var(--00010); }
    </style>
    <script>
        (function () {
            const saved = localStorage.getItem('view');
            if (saved) {
                document.documentElement.setAttribute('view', saved);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('view', prefersDark? 'dark' : 'light');
            }
            const media = window.matchMedia('(prefers-color-scheme: dark)');
            media.addEventListener('change', (e) => {
                if (!localStorage.getItem('view')) {
                    document.documentElement.setAttribute('view', e.matches? 'dark' : 'light');
                }
            });
        })();
    </script>
</head>
<body>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(location.search);
        const redirectUrl = params.get('redirect') || '/applications/deals/regions/kazakhstan/english.html';
        
        const lang = localStorage.getItem('lang');
        const country = localStorage.getItem('country');
        
        if (lang && country) {
            const fixedUrl = redirectUrl.replace(
                /\/regions\/[^\/]+\/(english|russian|kazakh)\.html/,
                `/regions/${country}/${lang}.html`
            );
            if (location.pathname!== new URL(fixedUrl, location.origin).pathname) {
                location.replace(fixedUrl);
            }
            return;
        }

        document.querySelectorAll('a[href*="localization/regions/"]').forEach(a => {
            const url = new URL(a.href, location.origin);
            url.searchParams.set('redirect', redirectUrl);
            a.href = url.toString();
        });
    });
    </script>
    <!--Добро пожаловать -->
    <div
        class="one"
        style="
            margin-top: 0px;
            font-size: 48px;">
        <!-- Сообщение -->
        <h1
            style="
                max-width: 720px;
                text-align: center;
                font-weight: 300;
                font-size: 48px;">
            Welcome to zefirma</h1>
        <!-- Бутон -->
        <a
            class="button"
            style=
                "
                font-size: 18px;
                
                padding-top: 9px;
                padding-right: 18px;
                padding-bottom: 9px;
                padding-left: 18px;
                "
            href="localization/regions/kazakhstan.html"
            >Kazakhstan
            </a>
        </div>
</body>
</html>
