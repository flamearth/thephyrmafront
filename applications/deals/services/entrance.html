<!doctype html>
<html>
    <head>
        <title>Entrance</title>
        <!-- Кодировка языка -->
        <meta
            charset="utf-8"
            >
        <!-- Лицо: Большое -->
        <link
            rel="apple-touch-icon"
            href="../large.png"
            >
        <!-- Лицо: Маленькое -->
        <link
            rel="icon"
            href="../small.png"
            >
        <!-- Веб Сайт -->
        <meta
            property="og:type"
            content="website"
            >
        <!-- Объяснение -->
        <meta
            name="description"
            content="Create or log in your personal account"
            >
        <!-- Обёртка -->
        <meta
            property="og:image"
            content="https://name.name/deals/preview.png">
        <!-- Ссылка -->
        <meta
            property="og:url"
            content="https://name.name/services/entrance.html"
            >
        <!-- Адаптация -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
            >
        <style>
            :root
                 {
                /* 100% */
                --1111: #2c2c2c;
                --9191: #FFFFFF;
                /* 85% */
                --11185: #000000D9;
                --91985: #FFFFFFD9;
                /* 65% */
                --11165: #000000A6;
                --91965: #FFFFFFA6;
                /* 35% */
                --11135: #00000059;
                --91935: #FFFFFF59;
                /* 10% */
                --11110: #0000001A;
                --91910: #FFFFFF1A;
                /* 0% */
                --1110: #2c2c2c00;
                --9190: #FFFFFF00;
                }
            *
                {
                box-sizing: border-box;
                }
            a
                {
                text-decoration: none;
                color: inherit;
                }
            html
                {
                width: 100%;
                height: 100%;
                display: block;
                background: var(--1111);
                color: var(--9191);
                font-family: sans-serif;
                font-size: 21px;
                font-weight: 300;
                }
            body
                {
                width: 100%;
                 
                display: flex;
                flex-direction: column;
                align-items: center;
                 
                background: var(--1111);
                 
                padding: 0px;
                margin: 0px;
                gap: 20px;
                 
                position: static;
                z-index: auto;
                }
            .space-between
                {
                width: 100%;
                 
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                 
                padding-top: 18px;
                padding-right: 20px;
                padding-bottom: 18px;
                padding-left: 20px;
                 
                background: linear-gradient(to bottom, var(--1111), var(--1110));
                
                position: fixed;
                z-index: 1;
                 }
            .button
                {
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 20px;
                overflow: hidden;
                transition: transform 0.2s ease;
                }
            .button:hover
                {
                backdrop-filter: blur(10px);
                background: var(--91910);
                }
            @media (max-width: 440px)
                {
                .space-between
                    {
                    padding-right: 30px;
                    padding-left: 30px;
                    }
                .button
                    {
                    backdrop-filter: blur(10px);
                    background: var(--91910);
                    }
                }
            </style>
        </head>
    <body>
        <!-- Верх -->
        <div
             class="space-between"
            >
                <!-- Вернутся -->
                <div
                    class="button"
                    style=
                        "
                        height: 40px;
                        width: 40px;
                        "
                    onclick=
                        "
                        history.back()
                        "
                        >✕
                    </div>
                <!-- Название -->
                <h1
                    style=
                        "
                        font-size: 18px;
                        font-weight: 500;
                        "
                    >Entrance
                    </h1>
                <!-- Продолжить -->
                <a
                    href="services/account.html"
                    class="button"
                    style=
                        "
                        height: 40px;
                        width: 40px;
                        font-size: 21px;
                        "
                    >✓
                    </a>
                </div>
        <!-- Ряд -->
        <div
            style=
                "
                width: 100%;
                max-width: 440px;
                 
                display: flex;
                flex-direction: column;
                 
                border-radius: 28px;
                 
                padding-top: 16px;
                padding-right: 20px;
                padding-bottom: 16px;
                padding-left: 20px;
                 
                gap: 16px;
                 
                margin-top: 78px;
                margin-left: 20px;
                margin-bottom: 2px;
                margin-right: 20px;
                 
                background: var(--91910);
                "
            >
                <!-- Имя -->
                <input
                    style=
                        "
                        width: 100%;
                         
                        color: inherit;
                        font: inherit;
                        text-align: center;
                         
                        border: none;
                        outline: none;
                        appearance: none;
                         
                        -webkit-appearance: none;
                        -moz-appearance: none;
                         
                        background: transparent;
                        "
                     type="text"
                     placeholder="inbox@mail.space"
                    >
                <!-- Черта -->
                <div
                    style=
                        "
                        height: 1.5px;
                        width: 100%;
                        background: var(--91910);
                        "
                    >
                    </div>
                <!-- Ключ -->
                <input
                    style=
                        "
                        width: 100%;
                         
                        color: inherit;
                        font: inherit;
                        text-align: center;
                         
                        border: none;
                        outline: none;
                         
                        background: transparent;
                         
                        appearance: none;
                        -webkit-appearance: none;
                        -moz-appearance: none;
                        "
                     type="text"
                     placeholder="• • • • • • • • • • •"
                    >
                <!-- Черта -->
                <div
                    style=
                        "
                        height: 1.5px;
                        width: 100%;
                        background: var(--91910);
                        "
                    >
                    </div>
                <!-- Уведомление -->
                <p
                    style=
                        "
                        font-size: 18px;
                        text-align: center;
                         
                        margin: 0;
                        padding: 0;
                         
                        color: var(--91965);
                        "
                    >Cannot be replaced or restored!
                    </p>
                </div>
                <!-- Документики -->
                <p
                    style=
                        "
                        width: 100%;
                        max-width: 400px;
                         
                        font-size: 18px;
                        text-align: center;
                         
                        margin-top: 2px;
                        margin-left: 20px;
                        margin-bottom: 2px;
                        margin-right: 20px;
                         
                        padding-right: 20px;
                        padding-left: 20px;
                         
                        color: var(--91965);
                        "
                    >By continuing, you confirm that you are at least 13 years old and agree to
                    <a
                        href="service/documents.html"
                        style=
                            "
                            text-decoration: underline;
                            color:inherit;
                            "
                        >Terms of Service and Privacy Policy
                        </a>
                    </p>
        </body>
    </html>
